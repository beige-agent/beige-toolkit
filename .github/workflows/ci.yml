name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_call:

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  sync-docs:
    # Only sync docs on push to main (not PRs or dev)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [typecheck, test]
    runs-on: ubuntu-latest

    steps:
      - name: Trigger beige docs sync
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.BEIGE_DOCS_SYNC_PAT }}
          repository: matthias-hausberger/beige
          event-type: toolkit-docs-updated
